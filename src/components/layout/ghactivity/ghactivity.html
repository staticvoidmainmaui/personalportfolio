<section class="ghactivity section" id="github" data-anim-ghactivity>
	<div class="ghactivity__container">

		<div class="ghactivity__live-label mono-note">
			<span class="ghactivity__live-dot"></span>
			LIVE PULSE
		</div>

		<div class="ghactivity__card">
			<div class="ghactivity__card-header">
				<span class="ghactivity__card-title mono-note">GITHUB ACTIVITY_</span>
				<span class="ghactivity__sync mono-note" data-gh-sync>
					<span class="ghactivity__sync-dot"></span>
					SYNCED WITH GITHUB
				</span>
			</div>

			<div class="ghactivity__heatmap" data-gh-heatmap aria-label="GitHub contribution heatmap">
				<div class="ghactivity__loading mono-note">// loading contributions…</div>
			</div>

			<div class="ghactivity__footer">
				<span class="ghactivity__total mono-note" data-gh-total>
					TOTAL CONTRIBUTIONS: <strong>—</strong>
				</span>
				<a href="https://github.com/staticvoidmainmaui" class="ghactivity__link mono-note" target="_blank" rel="noopener">
					// VIEW ON GITHUB →
				</a>
			</div>
		</div>

	</div>
</section>
