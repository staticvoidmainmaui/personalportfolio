<!-- Snippet HTML: quantity -->

<div class="quantity" data-anim-quantity>
	<button class="quantity__button quantity__button--minus" data-anim-quantity-minus type="button"></button>

	<div class="quantity__input">
		<input data-anim-quantity-value type="text" value="1" data-anim-quantity-min="1" data-anim-quantity-max="10">
	</div>

	<button class="quantity__button quantity__button--plus" data-anim-quantity-plus type="button"></button>
</div>
